<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lead Qualifier — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-sm">
  <div class="text-center mb-8">
    <div class="w-16 h-16 bg-gray-900 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">Lead Qualifier</h1>
    <p class="text-gray-500 text-sm mt-1">Agente comercial de IA</p>
  </div>
  <div id="error" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3 mb-4"></div>
  <form id="loginForm" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
      <input type="text" id="username" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900" placeholder="admin">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
      <input type="password" id="password" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900" placeholder="••••••••">
    </div>
    <button type="submit" class="w-full bg-gray-900 text-white py-2.5 rounded-lg font-medium text-sm hover:bg-gray-800 transition">
      Entrar
    </button>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const form = new FormData();
  form.append('username', document.getElementById('username').value);
  form.append('password', document.getElementById('password').value);
  const r = await fetch('/api/auth/token', {method:'POST', body: form});
  if (r.ok) {
    const d = await r.json();
    localStorage.setItem('token', d.access_token);
    location.href = '/dashboard.html';
  } else {
    const el = document.getElementById('error');
    el.textContent = 'Usuário ou senha inválidos';
    el.classList.remove('hidden');
  }
});
</script>
</body>
</html>
