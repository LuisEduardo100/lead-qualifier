<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Campanhas — Lead Qualifier</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-gray-900 text-white px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-6">
    <span class="font-bold text-lg">Lead Qualifier</span>
    <a href="/dashboard.html" class="text-sm text-gray-400 hover:text-white">Pipeline</a>
    <a href="/channels.html" class="text-sm text-gray-400 hover:text-white">Canais</a>
    <a href="/campaigns.html" class="text-sm text-white font-medium border-b border-white pb-0.5">Campanhas</a>
    <a href="/settings.html" class="text-sm text-gray-400 hover:text-white">Configurações</a>
  </div>
  <button onclick="localStorage.removeItem('token');location.href='/'" class="text-sm text-gray-400 hover:text-white">Sair</button>
</nav>

<div class="max-w-5xl mx-auto px-6 py-8">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Campanhas</h1>
    <button onclick="openCreateModal()" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">
      + Nova campanha
    </button>
  </div>

  <div id="campaigns-list" class="space-y-4"></div>
</div>

<!-- Modal Create Campaign -->
<div id="modal-create" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-8 w-full max-w-lg">
    <h2 class="font-bold text-lg text-gray-900 mb-6">Nova campanha</h2>
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Nome da campanha</label>
        <input type="text" id="new-camp-name" placeholder="Ex: Reativação Leads Frios" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Mensagem</label>
        <textarea id="new-camp-message" rows="4" placeholder="Olá {nome}, temos uma novidade especial para você..." class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 resize-none"></textarea>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Canal de envio</label>
        <select id="new-camp-channel" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
          <option value="">Selecione um canal...</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Filtro de status</label>
        <select id="new-camp-filter" onchange="updatePreview()" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
          <option value="">Todos</option>
          <option value="hot">Quente</option>
          <option value="warm">Morno</option>
          <option value="cold">Frio</option>
          <option value="new">Novo</option>
          <option value="lost">Perdido</option>
        </select>
      </div>
      <div class="bg-gray-50 rounded-lg px-4 py-3 flex items-center gap-2">
        <span class="text-sm text-gray-500">Destinatários estimados:</span>
        <span id="preview-count" class="font-semibold text-gray-900">—</span>
      </div>
    </div>
    <div class="flex gap-3 mt-6">
      <button onclick="closeCreateModal()" class="flex-1 border border-gray-200 text-gray-600 py-2.5 rounded-lg text-sm">Cancelar</button>
      <button onclick="createCampaign()" class="flex-1 bg-gray-900 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-gray-800">Criar campanha</button>
    </div>
  </div>
</div>

<!-- Modal Detail Campaign -->
<div id="modal-detail" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-8 w-full max-w-lg">
    <div class="flex items-start justify-between mb-6">
      <div>
        <h2 id="detail-name" class="font-bold text-lg text-gray-900"></h2>
        <div class="flex items-center gap-2 mt-1">
          <span id="detail-channel" class="text-sm text-gray-500"></span>
          <span id="detail-filter-badge" class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600"></span>
        </div>
      </div>
      <span id="detail-status-badge" class="px-2.5 py-1 rounded-full text-xs font-medium"></span>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-5">
      <div class="bg-gray-50 rounded-xl p-4 text-center">
        <p class="text-2xl font-bold text-gray-900" id="detail-total">—</p>
        <p class="text-xs text-gray-500 mt-1">Total</p>
      </div>
      <div class="bg-green-50 rounded-xl p-4 text-center">
        <p class="text-2xl font-bold text-green-700" id="detail-sent">—</p>
        <p class="text-xs text-green-600 mt-1">Enviados</p>
      </div>
      <div class="bg-red-50 rounded-xl p-4 text-center">
        <p class="text-2xl font-bold text-red-700" id="detail-failed">—</p>
        <p class="text-xs text-red-600 mt-1">Falhas</p>
      </div>
    </div>

    <div id="detail-progress-wrap" class="mb-5">
      <div class="flex justify-between text-xs text-gray-500 mb-1">
        <span>Progresso</span>
        <span id="detail-pct">0%</span>
      </div>
      <div class="w-full bg-gray-100 rounded-full h-2">
        <div id="detail-bar" class="bg-gray-900 h-2 rounded-full transition-all" style="width:0%"></div>
      </div>
    </div>

    <div class="mb-5">
      <p class="text-xs font-medium text-gray-500 mb-1">Mensagem</p>
      <p id="detail-message" class="text-sm text-gray-700 bg-gray-50 rounded-lg p-3 whitespace-pre-wrap"></p>
    </div>

    <div class="flex gap-3">
      <button onclick="closeDetailModal()" class="flex-1 border border-gray-200 text-gray-600 py-2.5 rounded-lg text-sm">Fechar</button>
      <button id="btn-launch" onclick="launchCampaign()" class="hidden flex-1 bg-gray-900 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-gray-800">Lançar campanha</button>
      <button id="btn-delete" onclick="deleteCampaign()" class="hidden border border-red-200 text-red-600 py-2.5 px-4 rounded-lg text-sm hover:bg-red-50">Excluir</button>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
if (!localStorage.getItem('token')) location.href = '/';

function escapeHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const FILTER_LABELS = { hot: 'Quente', warm: 'Morno', cold: 'Frio', new: 'Novo', lost: 'Perdido' };
const STATUS_CLASSES = {
  draft:   'bg-gray-100 text-gray-600',
  running: 'bg-blue-100 text-blue-700',
  done:    'bg-green-100 text-green-700',
  failed:  'bg-red-100 text-red-700',
};
const STATUS_LABELS = { draft: 'Rascunho', running: 'Em execução', done: 'Concluída', failed: 'Falha' };

let currentDetailId = null;

function filterLabel(status) {
  return status ? (FILTER_LABELS[status] || escapeHtml(status)) : 'Todos';
}

function campaignCard(c) {
  const total = c.total_recipients ?? 0;
  const sent  = c.sent_count ?? 0;
  const failed = c.failed_count ?? 0;
  const pct   = total > 0 ? Math.round((sent / total) * 100) : 0;
  const statusCls = STATUS_CLASSES[c.status] || 'bg-gray-100 text-gray-600';
  const statusLbl = STATUS_LABELS[c.status] || escapeHtml(c.status);

  return `<div onclick="openDetailModal(${c.id})" class="bg-white rounded-xl border border-gray-100 p-5 cursor-pointer hover:shadow-md transition">
    <div class="flex items-start justify-between gap-3">
      <div class="flex-1 min-w-0">
        <p class="font-medium text-gray-900 truncate">${escapeHtml(c.name)}</p>
        <div class="flex items-center gap-2 mt-1 flex-wrap">
          <span class="text-xs text-gray-400">${escapeHtml(c.channel_name || '')}</span>
          <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600">${escapeHtml(filterLabel(c.filter_status))}</span>
        </div>
      </div>
      <span class="px-2.5 py-1 rounded-full text-xs font-medium shrink-0 ${statusCls}">${statusLbl}</span>
    </div>
    <div class="flex items-center gap-6 mt-4 text-sm">
      <div class="text-center">
        <p class="font-semibold text-gray-900">${total}</p>
        <p class="text-xs text-gray-400">Total</p>
      </div>
      <div class="text-center">
        <p class="font-semibold text-green-700">${sent}</p>
        <p class="text-xs text-gray-400">Enviados</p>
      </div>
      <div class="text-center">
        <p class="font-semibold text-red-600">${failed}</p>
        <p class="text-xs text-gray-400">Falhas</p>
      </div>
      <div class="flex-1">
        <div class="flex justify-between text-xs text-gray-400 mb-1">
          <span>Progresso</span><span>${pct}%</span>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-1.5">
          <div class="bg-gray-900 h-1.5 rounded-full" style="width:${pct}%"></div>
        </div>
      </div>
    </div>
  </div>`;
}

async function load() {
  const campaigns = await apiGet('/api/campaigns');
  const el = document.getElementById('campaigns-list');
  if (!campaigns.length) {
    el.textContent = '';
    const empty = document.createElement('div');
    empty.className = 'text-center py-16 text-gray-400';
    const p1 = document.createElement('p');
    p1.className = 'font-medium';
    p1.textContent = 'Nenhuma campanha ainda.';
    const p2 = document.createElement('p');
    p2.className = 'text-sm mt-1';
    p2.textContent = 'Crie sua primeira campanha para disparar mensagens em massa.';
    empty.appendChild(p1);
    empty.appendChild(p2);
    el.appendChild(empty);
    return;
  }
  el.innerHTML = campaigns.map(campaignCard).join('');
}

// Create modal
async function openCreateModal() {
  document.getElementById('new-camp-name').value = '';
  document.getElementById('new-camp-message').value = '';
  document.getElementById('new-camp-filter').value = '';
  document.getElementById('preview-count').textContent = '—';

  // Populate channels
  const channels = await apiGet('/api/channels');
  const sel = document.getElementById('new-camp-channel');
  sel.innerHTML = '<option value="">Selecione um canal...</option>' +
    channels.map(c => `<option value="${escapeHtml(String(c.id))}">${escapeHtml(c.name)}</option>`).join('');

  document.getElementById('modal-create').classList.remove('hidden');
  updatePreview();
}

function closeCreateModal() {
  document.getElementById('modal-create').classList.add('hidden');
}

async function updatePreview() {
  const filterStatus = document.getElementById('new-camp-filter').value || null;
  const countEl = document.getElementById('preview-count');
  countEl.textContent = '...';
  try {
    const res = await apiPost('/api/campaigns/preview', { filter_status: filterStatus });
    countEl.textContent = res.count ?? '—';
  } catch(e) {
    countEl.textContent = '—';
  }
}

async function createCampaign() {
  const name = document.getElementById('new-camp-name').value.trim();
  const message = document.getElementById('new-camp-message').value.trim();
  const channelId = document.getElementById('new-camp-channel').value;
  const filterStatus = document.getElementById('new-camp-filter').value || null;

  if (!name) { alert('Informe o nome da campanha.'); return; }
  if (!message) { alert('Informe a mensagem.'); return; }
  if (!channelId) { alert('Selecione um canal de envio.'); return; }

  const res = await apiPost('/api/campaigns', {
    name,
    message,
    channel_id: parseInt(channelId),
    filter_status: filterStatus,
  });

  if (res.id) {
    closeCreateModal();
    await load();
  } else {
    alert('Erro ao criar campanha: ' + (res.detail || JSON.stringify(res)));
  }
}

// Detail modal
async function openDetailModal(id) {
  currentDetailId = id;
  const c = await apiGet(`/api/campaigns/${id}`);

  const total   = c.total_recipients ?? 0;
  const sent    = c.sent_count ?? 0;
  const failed  = c.failed_count ?? 0;
  const pct     = total > 0 ? Math.round((sent / total) * 100) : 0;

  document.getElementById('detail-name').textContent         = c.name;
  document.getElementById('detail-channel').textContent      = c.channel_name || '';
  document.getElementById('detail-filter-badge').textContent = filterLabel(c.filter_status);

  const statusBadgeEl = document.getElementById('detail-status-badge');
  statusBadgeEl.textContent = STATUS_LABELS[c.status] || c.status;
  statusBadgeEl.className = 'px-2.5 py-1 rounded-full text-xs font-medium ' + (STATUS_CLASSES[c.status] || 'bg-gray-100 text-gray-600');

  document.getElementById('detail-total').textContent  = total;
  document.getElementById('detail-sent').textContent   = sent;
  document.getElementById('detail-failed').textContent = failed;

  document.getElementById('detail-pct').textContent = pct + '%';
  document.getElementById('detail-bar').style.width  = pct + '%';

  // Message uses textContent (safe)
  document.getElementById('detail-message').textContent = c.message || '';

  // Launch button: only for draft
  const btnLaunch = document.getElementById('btn-launch');
  if (c.status === 'draft') {
    btnLaunch.classList.remove('hidden');
  } else {
    btnLaunch.classList.add('hidden');
  }

  // Delete button: not when running
  const btnDelete = document.getElementById('btn-delete');
  if (c.status !== 'running') {
    btnDelete.classList.remove('hidden');
  } else {
    btnDelete.classList.add('hidden');
  }

  document.getElementById('modal-detail').classList.remove('hidden');
}

function closeDetailModal() {
  currentDetailId = null;
  document.getElementById('modal-detail').classList.add('hidden');
}

async function launchCampaign() {
  if (!currentDetailId) return;
  if (!confirm('Lançar a campanha agora? As mensagens serão enviadas imediatamente.')) return;
  const res = await apiPost(`/api/campaigns/${currentDetailId}/launch`, {});
  if (res.id || res.status) {
    closeDetailModal();
    await load();
  } else {
    alert('Erro ao lançar campanha: ' + (res.detail || JSON.stringify(res)));
  }
}

async function deleteCampaign() {
  if (!currentDetailId) return;
  if (!confirm('Excluir esta campanha? Esta ação não pode ser desfeita.')) return;
  await apiDelete(`/api/campaigns/${currentDetailId}`);
  closeDetailModal();
  await load();
}

load();
setInterval(load, 5000);
</script>
</body>
</html>
